<text x="171" y="203.0" class="label" text-anchor="end">Cursor</text>
<rect x="185" y="176" width="58.6" height="44" rx="4" fill="#457B9D"/>
<text x="251.6" y="203.0" class="value" text-anchor="start" fill="#1F2933">7.3%</text>
<text x="171" y="272.0" class="label" text-anchor="end">Devin</text>
<rect x="185" y="245" width="338.1" height="44" rx="4" fill="#F4A261"/>
